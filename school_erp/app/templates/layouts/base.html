<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}School ERP{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/theme.css') }}" />
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  </head>
  <body>
    {% import 'components/top_nav.html' as top_nav %}
    {% import 'components/role_sidebar.html' as role_sidebar %}

    {{ top_nav.render(user if user is defined else current_user) }}
    <div class="app-shell">
      {{ role_sidebar.render(role if role is defined else current_role) }}
      <main class="content-area">
        {% block content %}{% endblock %}
      </main>
    </div>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
  </body>
</html>
