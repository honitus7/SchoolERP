<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login | School ERP</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/theme.css') }}" />
  </head>
  <body class="login-screen">
    <section class="login-card">
      <h1>School ERP Login</h1>
      {% if error %}<p class="error-text">{{ error }}</p>{% endif %}
      <form method="post" action="{{ url_for('auth.login_page') }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
        <label>Username or Email</label>
        <input name="username" required />
        <label>Password</label>
        <input name="password" type="password" required />
        <button class="btn" type="submit">Login</button>
      </form>
      <p class="hint">Use seeded accounts: admin/teacher/parent/student</p>
    </section>
  </body>
</html>
